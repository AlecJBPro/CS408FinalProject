<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: "#2f5d3a",
            mist: "#f5f5f5"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-mist text-forest">
  <main class="mx-auto flex min-h-screen max-w-4xl items-center justify-center px-6 py-12">
    <section class="w-full rounded-3xl border border-forest/15 bg-white p-8 shadow-2xl shadow-forest/10">
      <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="text-sm uppercase tracking-[0.25em] text-forest/60">Bud-Cal</p>
          <h1 class="mt-2 text-3xl font-semibold" th:text="'Welcome, ' + ${userName} + '!'">Welcome!</h1>
          <p class="mt-3 text-base text-forest/80">
            Your authentication checkpoint is wired up with registration, hashed passwords,
            session-backed login, and a live database connection.
          </p>
        </div>

        <form th:action="@{/logout}" method="post">
          <button
            type="submit"
            class="rounded-2xl bg-forest px-5 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-mist transition hover:bg-forest/90"
          >
            Log Out
          </button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
