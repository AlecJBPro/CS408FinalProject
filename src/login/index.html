<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: "#2f5d3a",
            mist: "#f5f5f5",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-mist text-forest">
  <main class="flex min-h-screen items-center justify-center px-6 py-12">
    <section class="w-full max-w-md rounded-3xl border border-forest/15 bg-white p-8 shadow-2xl shadow-forest/10">
      <form class="space-y-6">
        <div class="space-y-2">
          <label for="email" class="block text-sm font-semibold tracking-wide">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            class="w-full rounded-2xl border border-forest/20 bg-mist px-4 py-3 text-base text-forest outline-none transition focus:border-forest focus:ring-2 focus:ring-forest/20"
          />
        </div>

        <div class="space-y-2">
          <label for="password" class="block text-sm font-semibold tracking-wide">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            class="w-full rounded-2xl border border-forest/20 bg-mist px-4 py-3 text-base text-forest outline-none transition focus:border-forest focus:ring-2 focus:ring-forest/20"
          />
        </div>

        <button
          type="submit"
          class="w-full rounded-2xl bg-forest px-4 py-3 text-sm font-semibold uppercase tracking-[0.2em] text-mist transition hover:bg-forest/90"
        >
          Log In
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-forest/80">
        Need an account?
        <a href="../signup/index.html" class="font-semibold underline decoration-forest/40 underline-offset-4 hover:text-forest">
          Sign up
        </a>
      </p>
    </section>
  </main>
</body>
</html>
